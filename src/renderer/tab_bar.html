<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 36px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    color: #ccc;
    user-select: none;
    -webkit-app-region: drag;
  }
  #tabs {
    display: flex;
    flex: 1;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }
  .tab {
    display: flex;
    align-items: center;
    max-width: 200px;
    min-width: 80px;
    padding: 0 12px;
    height: 36px;
    cursor: pointer;
    border-right: 1px solid #2a2a2a;
    transition: background 0.15s;
  }
  .tab:hover { background: #2a2a2a; }
  .tab.active { background: #2d2d30; color: #fff; border-bottom: 2px solid #007acc; }
  .tab-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 8px;
  }
  .tab-close {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    font-size: 14px;
    color: #666;
    cursor: pointer;
  }
  .tab-close:hover { background: #3a3a3a; color: #fff; }
  #new-tab {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    color: #888;
    -webkit-app-region: no-drag;
  }
  #new-tab:hover { background: #2a2a2a; color: #fff; }
  .tab-id { color: #555; font-size: 10px; margin-right: 4px; }
</style>
</head>
<body>
<div id="tabs"></div>
<div id="new-tab">+</div>
<script>
const { ipcRenderer } = require('electron');

function renderTabs() {
  const tabs = ipcRenderer.sendSync('tab:list');
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  for (const tab of tabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.active ? ' active' : '');
    el.innerHTML = '<span class="tab-id">[' + tab.id + ']</span>' +
      '<span class="tab-title">' + (tab.title || tab.url || 'New Tab') + '</span>' +
      '<span class="tab-close" data-id="' + tab.id + '">×</span>';
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('tab-close')) {
        ipcRenderer.send('tab:close', parseInt(e.target.dataset.id));
      } else {
        ipcRenderer.send('tab:activate', tab.id);
      }
      setTimeout(renderTabs, 100);
    });
    container.appendChild(el);
  }
}

document.getElementById('new-tab').addEventListener('click', function() {
  ipcRenderer.send('tab:new');
  setTimeout(renderTabs, 100);
});

// Refresh tab titles every 2 seconds
renderTabs();
setInterval(renderTabs, 2000);
</script>
</body>
</html>
