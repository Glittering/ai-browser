<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>iframe test</title></head>
<body>
<h1>父页面</h1>
<button>外层按钮</button>
<iframe src="about:blank" title="内嵌广告" id="ad-frame" style="width:300px;height:200px;border:1px solid red"></iframe>
<script>
  // Inject content into iframe (same-origin)
  var iframe = document.getElementById('ad-frame');
  iframe.onload = function() {
    var doc = iframe.contentDocument;
    doc.body.innerHTML = '<h2>广告内容</h2><button>iframe内按钮</button><a href="#">iframe内链接</a><input placeholder="搜索框"></div>';
  };
  iframe.src = 'about:blank';
</script>
</body></html>
